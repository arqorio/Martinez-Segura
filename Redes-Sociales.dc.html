<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  componentDidMount(){ this.buildQR(); }
  componentDidUpdate(){ this.buildQR(); }
  buildQR(){
    const url = 'https://martinezseguramultiserviciosni.com/';
    const dark = '#17333D';
    const run = () => {
      if (!window.qrcode) { this._t = setTimeout(run, 80); return; }
      document.querySelectorAll('[data-qr]').forEach(el => {
        if (el.dataset.done) return;
        const qr = window.qrcode(0, el.dataset.ecc || 'H');
        qr.addData(el.dataset.url || url); qr.make();
        el.innerHTML = qr.createSvgTag({ cellSize: 8, margin: 0, scalable: true });
        const svg = el.querySelector('svg');
        if (svg) {
          svg.setAttribute('width', '100%');
          svg.setAttribute('height', '100%');
          svg.style.display = 'block';
          svg.querySelectorAll('path,rect').forEach(n => {
            const f = (n.getAttribute('fill') || '').toLowerCase();
            if (f === '#000000' || f === 'black' || f === '#000') n.setAttribute('fill', dark);
          });
        }
        el.dataset.done = '1';
      });
    };
    run();
  }
}
